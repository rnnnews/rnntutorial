<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Как скачать модифицированные приложения на iOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding-bottom: 60px;
        }

        /* верхний бар с блюром (frosted glass) */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 1000;
        }

        /* три полоски меню */
        .burger-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 20px;
            height: 14px;
            cursor: pointer;
            margin-right: 20px;
        }

        .burger-line {
            width: 100%;
            height: 2px;
            background-color: #000;
            border-radius: 1px;
        }

        /* сборное лого */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
        }

        .logo-rnn {
            font-style: italic;
            font-weight: 300;
        }

        .logo-x {
            font-weight: 300;
            color: #8e8e93;
            font-size: 18px;
        }

        .logo-modi {
            font-weight: 700;
        }

        /* тонкая перегородка под баром */
        .divider {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.08);
            z-index: 1000;
        }

        /* контент */
        .main-content {
            margin-top: 60px;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        /* главный заголовок */
        .main-title {
            font-weight: 600;
            font-size: 28px;
            line-height: 1.25;
            margin-bottom: 32px;
            color: #000;
        }

        /* контейнер для шагов с линией слева */
        .steps-container {
            position: relative;
            padding-left: 20px;
            margin-bottom: 40px;
        }

        /* вертикальная пунктирная линия */
        .steps-container::before {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 0;
            width: 2px;
            background-image: linear-gradient(to bottom, #0376ff 50%, rgba(0,0,0,0) 0%);
            background-position: right;
            background-size: 2px 10px;
            background-repeat: repeat-y;
        }

        /* карточка шага */
        .step-card {
            position: relative;
            background-color: #f5f5f7;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .step-card:last-child {
            margin-bottom: 0;
        }

        /* точка на линии для каждого шага */
        .step-node {
            position: absolute;
            left: -25px;
            top: 22px;
            width: 12px;
            height: 12px;
            background-color: #0376ff;
            border-radius: 50px;
            border: 2px solid #fff;
        }

        /* текст внутри карточки */
        .step-text {
            font-weight: 400;
            font-size: 15px;
            line-height: 1.55;
            color: #1d1d1f;
        }

        /* важный блок */
        .important-badge {
            display: inline-block;
            background-color: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            font-weight: 600;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* блок с видосом */
        .video-box {
            background-color: #f5f5f7;
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            margin-top: 32px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
